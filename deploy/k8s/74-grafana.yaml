# ── Grafana ───────────────────────────────────────────────────────────────────
# NodePort 32030 으로 접근: http://<node-ip>:32030
# 초기 계정: admin / admin123 (첫 로그인 후 변경 권장)
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin123

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 15s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        jsonData:
          maxLines: 1000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# ResearchAI BE 기본 대시보드
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  research-ai.json: |
    {
      "title": "ResearchAI BE",
      "uid": "research-ai-be",
      "schemaVersion": 38,
      "refresh": "10s",
      "panels": [
        {
          "id": 1, "type": "stat", "title": "요청 수 (1m)",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{"expr": "sum(rate(http_requests_total[1m]))", "datasource": {"uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 2, "type": "stat", "title": "에러율 (5xx)",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{"expr": "sum(rate(http_requests_total{status=~\"5..\"}[1m])) / sum(rate(http_requests_total[1m])) * 100", "datasource": {"uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "unit": "percent"}
        },
        {
          "id": 3, "type": "stat", "title": "활성 요청",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [{"expr": "http_active_requests", "datasource": {"uid": "prometheus"}}]
        },
        {
          "id": 4, "type": "stat", "title": "메모리 사용량",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [{"expr": "node_nodejs_heap_size_used_bytes / 1024 / 1024", "datasource": {"uid": "prometheus"}}],
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "unit": "MB"}
        },
        {
          "id": 5, "type": "timeseries", "title": "HTTP 요청률 (상태코드별)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{"expr": "sum by(status) (rate(http_requests_total[1m]))", "legendFormat": "{{status}}", "datasource": {"uid": "prometheus"}}]
        },
        {
          "id": 6, "type": "timeseries", "title": "응답 지연 (p50/p90/p99)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by(le) (rate(http_request_duration_seconds_bucket[5m])))", "legendFormat": "p50", "datasource": {"uid": "prometheus"}},
            {"expr": "histogram_quantile(0.90, sum by(le) (rate(http_request_duration_seconds_bucket[5m])))", "legendFormat": "p90", "datasource": {"uid": "prometheus"}},
            {"expr": "histogram_quantile(0.99, sum by(le) (rate(http_request_duration_seconds_bucket[5m])))", "legendFormat": "p99", "datasource": {"uid": "prometheus"}}
          ]
        },
        {
          "id": 7, "type": "logs", "title": "BE 로그 (최근)",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 12},
          "targets": [{"expr": "{namespace=\"research-ai\", app=\"be\"}", "datasource": {"uid": "loki"}}],
          "options": {"showTime": true, "sortOrder": "Descending"}
        }
      ]
    }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32030

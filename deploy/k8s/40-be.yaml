apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  namespace: research-ai
  labels:
    app: be
spec:
  # SQLite 파일 공유 제약으로 현재는 1 replica. PostgreSQL 마이그레이션 후 N 으로 확장 가능.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: be
  template:
    metadata:
      labels:
        app: be
    spec:
      containers:
        - name: be
          image: ghcr.io/yoonchulchung/researchai/be:53b62e8d9489794cdc241d6429d3c138c6aa030d
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: research-ai-config
            - secretRef:
                name: research-ai-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: media
              mountPath: /app/media
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          # startupProbe: NestJS + TypeORM 기동 완료까지 최대 90s 대기
          startupProbe:
            httpGet:
              path: /api/config
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /api/config
              port: 3001
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/config
              port: 3001
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: be-data
        - name: media
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: be
  namespace: research-ai
spec:
  type: ClusterIP
  selector:
    app: be
  ports:
    - name: http
      port: 3001
      targetPort: 3001

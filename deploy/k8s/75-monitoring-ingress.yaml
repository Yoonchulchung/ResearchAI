# ── Monitoring Ingress (경로 기반) ─────────────────────────────────────────────
# 도메인/grafana/    → Grafana   (내장 로그인으로 보호)
# 도메인/prometheus/ → Prometheus (BasicAuth 로 보호)
# 도메인/argocd/    → ArgoCD    (내장 로그인으로 보호)
#
# Prometheus BasicAuth Secret 사전 생성 필요:
#   htpasswd -nbB admin YOUR_PASSWORD | kubectl create secret generic \
#     prometheus-basic-auth --from-literal=users="$(cat -)" -n monitoring

# ── Prometheus: BasicAuth 미들웨어 ────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: prometheus-auth
  namespace: monitoring
spec:
  basicAuth:
    secret: prometheus-basic-auth

---
# ── Prometheus: StripPrefix 미들웨어 ──────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: prometheus-stripprefix
  namespace: monitoring
spec:
  stripPrefix:
    prefixes:
      - /prometheus

---
# ── Grafana Ingress ────────────────────────────────────────────────────────────
# GF_SERVER_SERVE_FROM_SUB_PATH=true 로 Grafana 자체가 /grafana/ 처리
# StripPrefix 불필요 — Traefik이 /grafana/... 를 그대로 전달
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "50"
spec:
  ingressClassName: traefik
  rules:
    - host: researches.uk
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
# ── Prometheus Ingress ─────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "50"
    traefik.ingress.kubernetes.io/router.middlewares: >-
      monitoring-prometheus-auth@kubernetescrd,monitoring-prometheus-stripprefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: researches.uk
      http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

---
# ── ArgoCD Ingress ─────────────────────────────────────────────────────────────
# ArgoCD Server는 --insecure 모드로 실행됨 (TLS는 Cloudflare가 처리)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "50"
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: researches.uk
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80

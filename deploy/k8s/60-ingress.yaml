# k3s 기본 ingress controller: Traefik
# 외부에서 http://<node-ip>/ 로 접근 → BE/FE 로 라우팅
#
# Traefik 의 path Prefix 매칭은 보통 더 긴 prefix 가 우선이지만, 안전하게
# BE Ingress (router.priority 높음) 와 FE Ingress 를 분리합니다.

# ── BE: /api, /ws, /backgrounds ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-ai-be
  namespace: research-ai
  annotations:
    # 우선순위 — 같은 호스트 내에서 더 높은 priority 가 먼저 매칭됨
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: be
                port:
                  number: 3001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: be
                port:
                  number: 3001
          - path: /backgrounds
            pathType: Prefix
            backend:
              service:
                name: be
                port:
                  number: 3001
---
# ── FE: 그 외 모든 경로 (/) ────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-ai-fe
  namespace: research-ai
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1"
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fe
                port:
                  number: 3000

# BE SQLite + 미디어 업로드용 퍼시스턴트 볼륨
# k3s 기본 StorageClass: local-path (ReadWriteOnce)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: be-data
  namespace: research-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
# Qdrant 벡터 DB 볼륨
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: research-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path

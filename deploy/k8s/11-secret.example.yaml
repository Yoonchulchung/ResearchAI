# ⚠️ 실제 배포 시 이 파일을 복사해서 secret.yaml 로 만들고 값 입력 후
#    kubectl apply 하세요. secret.yaml 은 .gitignore 에 이미 포함되어 있습니다.
# stringData 를 쓰면 base64 인코딩이 필요 없습니다.
apiVersion: v1
kind: Secret
metadata:
  name: research-ai-secret
  namespace: research-ai
type: Opaque
stringData:
  # ── Auth ─────────────────────────────────────────────────
  JWT_SECRET: "change-me-to-a-random-long-string"

  # ── 기본 AI (사용자 API 키 없을 때 폴백) ───────────────────
  DEFAULT_GOOGLE_API_KEY: "AIzaSy..."    # aistudio.google.com 에서 발급
  DEFAULT_GROQ_API_KEY: "gsk_..."         # console.groq.com 에서 발급

  # ── (선택) 관리자용 시스템 키들 ────────────────────────────
  ANTHROPIC_ADMIN_API_KEY: ""
  TAVILY_API_KEY: ""
  SERPER_API_KEY: ""
  NAVER_CLIENT_ID: ""
  NAVER_CLIENT_SECRET: ""
  BRAVE_API_KEY: ""

  # ── Gmail OAuth (선택) ─────────────────────────────────────
  GMAIL_CLIENT_ID: ""
  GMAIL_CLIENT_SECRET: ""
  GMAIL_REDIRECT_URI: "https://your-domain.com/api/gmail/callback"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: research-ai
  labels:
    app: fe
spec:
  # 이중화 — Next.js 는 stateless 이므로 수평 확장 가능
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      # 서로 다른 노드에 분산 (가능한 경우)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fe
                topologyKey: kubernetes.io/hostname
      containers:
        - name: fe
          image: ghcr.io/yoonchulchung/researchai/fe:f3ec2e75d0c398b6cf70ac054ef6df2e0bdd75dc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            # FE 는 Ingress 경유로 /api, /ws 접근 → window.location.origin 자동 사용
            # SSR 시 컨테이너 내부에서 BE 호출 필요하면 아래를 명시 (선택)
            # - name: NEXT_PUBLIC_API_BASE
            #   value: "http://be:3001/api"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: research-ai
spec:
  type: ClusterIP
  selector:
    app: fe
  ports:
    - name: http
      port: 3000
      targetPort: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: research-ai
  labels:
    app: fe
spec:
  # 이중화 — Next.js 는 stateless 이므로 수평 확장 가능
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      # 서로 다른 노드에 분산 (가능한 경우)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fe
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 15
      containers:
        - name: fe
          image: ghcr.io/yoonchulchung/researchai/fe:7cf863e261d7b83a6e73ca8f8a71afc1580bbf4e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            # FE 는 Ingress 경유로 /api, /ws 접근 → window.location.origin 자동 사용
            # SSR 시 컨테이너 내부에서 BE 호출 필요하면 아래를 명시 (선택)
            # - name: NEXT_PUBLIC_API_BASE
            #   value: "http://be:3001/api"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          # startupProbe: 앱 기동 완료까지 최대 60s 대기 (readiness/liveness 차단)
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fe
  namespace: research-ai
spec:
  type: ClusterIP
  selector:
    app: fe
  ports:
    - name: http
      port: 3000
      targetPort: 3000

# ── ArgoCD Ingress (same domain, path based) ────────────────────────────────
# https://researches.uk/argocd/ → argocd-server
#
# run.sh deploy patches argocd-server with:
#   --basehref /argocd
#   --rootpath /argocd
#   --insecure
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "60"
spec:
  ingressClassName: traefik
  rules:
    - host: researches.uk
      http:
        paths:
          - path: /argocd
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80

name: Build images and update ArgoCD manifests

on:
  push:
    branches:
      - main
    paths:
      - "BE/**"
      - "FE/**"
      - ".github/workflows/build-and-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.service }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: be
            arch: amd64
            runner: ubuntu-latest
            context: ./BE
            dockerfile: ./BE/Dockerfile
          - service: be
            arch: arm64
            runner: ubuntu-24.04-arm
            context: ./BE
            dockerfile: ./BE/Dockerfile
          - service: fe
            arch: amd64
            runner: ubuntu-latest
            context: ./FE
            dockerfile: ./FE/Dockerfile
          - service: fe
            arch: arm64
            runner: ubuntu-24.04-arm
            context: ./FE
            dockerfile: ./FE/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: meta
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_LC="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_LC,,}"
          echo "arch_image=ghcr.io/${OWNER_LC}/${REPO_LC}/${{ matrix.service }}:${GITHUB_SHA}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.arch_image }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  publish:
    name: Publish manifests and update ArgoCD tags
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: meta
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_LC="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_LC,,}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "short_sha=${SHORT_SHA}"                                                     >> "$GITHUB_OUTPUT"
          echo "be_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:${GITHUB_SHA}"                  >> "$GITHUB_OUTPUT"
          echo "be_main_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:main"                      >> "$GITHUB_OUTPUT"
          echo "be_amd64_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:${GITHUB_SHA}-amd64"      >> "$GITHUB_OUTPUT"
          echo "be_arm64_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:${GITHUB_SHA}-arm64"      >> "$GITHUB_OUTPUT"
          echo "fe_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:${GITHUB_SHA}"                  >> "$GITHUB_OUTPUT"
          echo "fe_main_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:main"                      >> "$GITHUB_OUTPUT"
          echo "fe_amd64_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:${GITHUB_SHA}-amd64"      >> "$GITHUB_OUTPUT"
          echo "fe_arm64_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:${GITHUB_SHA}-arm64"      >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-architecture image manifests
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.be_image }}" \
            -t "${{ steps.meta.outputs.be_main_image }}" \
            "${{ steps.meta.outputs.be_amd64_image }}" \
            "${{ steps.meta.outputs.be_arm64_image }}"

          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.fe_image }}" \
            -t "${{ steps.meta.outputs.fe_main_image }}" \
            "${{ steps.meta.outputs.fe_amd64_image }}" \
            "${{ steps.meta.outputs.fe_arm64_image }}"

      - name: Update Kubernetes image tags
        shell: bash
        run: |
          BE_IMAGE="${{ steps.meta.outputs.be_image }}"
          FE_IMAGE="${{ steps.meta.outputs.fe_image }}"

          perl -0pi -e "s#image:\\s+\\S*be:\\S+#image: ${BE_IMAGE}#g" deploy/k8s/40-be.yaml
          perl -0pi -e "s#image:\\s+\\S*fe:\\S+#image: ${FE_IMAGE}#g" deploy/k8s/50-fe.yaml

          grep -n "image:" deploy/k8s/40-be.yaml deploy/k8s/50-fe.yaml

      - name: Commit image tag changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add deploy/k8s/40-be.yaml deploy/k8s/50-fe.yaml

          if git diff --cached --quiet; then
            echo "No Kubernetes image tag changes to commit."
            exit 0
          fi

          git commit -m "chore: deploy images ${{ steps.meta.outputs.short_sha }}"
          git push

      - name: Trigger ArgoCD sync
        if: ${{ env.ARGOCD_SERVER != '' }}
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        shell: bash
        run: |
          # Git push 후 ArgoCD 폴링 대기(최대 3분)를 제거하고 즉시 sync 트리거
          curl -k -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://${ARGOCD_SERVER}/api/v1/applications/research-ai/sync" \
            -d '{"prune":true,"revision":"HEAD"}' \
          | grep -qE '^2' && echo "ArgoCD sync triggered." || echo "ArgoCD sync skipped (non-2xx — check ARGOCD_SERVER/ARGOCD_AUTH_TOKEN secrets)."

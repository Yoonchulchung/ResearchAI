name: Build images and update ArgoCD manifests

on:
  push:
    branches:
      - main
    paths:
      - "BE/**"
      - "FE/**"
      - ".github/workflows/build-and-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PLATFORMS: linux/amd64

jobs:
  build-and-update:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: meta
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_LC="${GITHUB_REPOSITORY#*/}"
          REPO_LC="${REPO_LC,,}"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "be_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "be_main_image=ghcr.io/${OWNER_LC}/${REPO_LC}/be:main" >> "$GITHUB_OUTPUT"
          echo "fe_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "fe_main_image=ghcr.io/${OWNER_LC}/${REPO_LC}/fe:main" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./BE
          file: ./BE/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ steps.meta.outputs.be_image }}
            ${{ steps.meta.outputs.be_main_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./FE
          file: ./FE/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ steps.meta.outputs.fe_image }}
            ${{ steps.meta.outputs.fe_main_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Update Kubernetes image tags
        shell: bash
        run: |
          BE_IMAGE="${{ steps.meta.outputs.be_image }}"
          FE_IMAGE="${{ steps.meta.outputs.fe_image }}"

          perl -0pi -e "s#image:\\s+\\S*be:\\S+#image: ${BE_IMAGE}#g" deploy/k8s/40-be.yaml
          perl -0pi -e "s#image:\\s+\\S*fe:\\S+#image: ${FE_IMAGE}#g" deploy/k8s/50-fe.yaml

          grep -n "image:" deploy/k8s/40-be.yaml deploy/k8s/50-fe.yaml

      - name: Commit image tag changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add deploy/k8s/40-be.yaml deploy/k8s/50-fe.yaml

          if git diff --cached --quiet; then
            echo "No Kubernetes image tag changes to commit."
            exit 0
          fi

          git commit -m "chore: deploy images ${{ steps.meta.outputs.short_sha }}"
          git push
